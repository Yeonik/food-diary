# `docker compose up` builds the image, migrates a SQLite database on a
# persisted volume, and serves the diary. The published host port is APP_PORT
# (default 8000); change it in .env if that port is taken.
services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/storage/app/food-diary.sqlite
      # Keep sessions and cache off the (ephemeral) filesystem framework dirs.
      SESSION_DRIVER: database
      CACHE_STORE: database
      # Recognition and lookups. A Gemini key is required for recognition; with
      # no key the app runs but photo recognition fails loudly (it never invents
      # a result). Manual entry, the library, weight and goals work without it.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      USDA_API_KEY: ${USDA_API_KEY:-}
      # Optional access password. A bcrypt hash contains `$`, which compose
      # interpolation treats specially — so in .env each `$` is doubled to `$$`
      # and compose restores it to a single `$` here.
      APP_ACCESS_PASSWORD: ${APP_ACCESS_PASSWORD:-}
    volumes:
      # Persist the database and uploaded photos across restarts.
      - storage:/app/storage

volumes:
  storage:
