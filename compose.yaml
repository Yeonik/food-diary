# `docker compose up` builds the image, migrates a SQLite database on a
# persisted volume, and serves the diary. The published host port is APP_PORT
# (default 8000); change it in .env if that port is taken.
services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/storage/app/food-diary.sqlite
      # Keep sessions and cache off the (ephemeral) filesystem framework dirs.
      SESSION_DRIVER: database
      CACHE_STORE: database
      # Recognition and lookups. A Gemini key is required for recognition; with
      # no key the app runs but photo recognition fails loudly (it never invents
      # a result). Manual entry, the library, weight and goals work without it.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Some Gemini models answer 429 (free-tier quota 0) or 404 (hidden from new
      # keys); GEMINI_MODEL picks one the key can reach. Falls back to the config
      # default when unset.
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      USDA_API_KEY: ${USDA_API_KEY:-}
      # The owner's account, created the first time migrations run. Without an
      # address the migration refuses before it writes anything, so `up` fails
      # loudly rather than leaving an instance nobody can sign in to.
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-}
      OWNER_NAME: ${OWNER_NAME:-}
    volumes:
      # Persist the database and uploaded photos across restarts.
      - storage:/app/storage

volumes:
  storage:
